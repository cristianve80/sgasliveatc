<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Aeropuerto SGAS</title>
<style>
body{margin:0;font-family:Arial,sans-serif;background:#0b1220;color:#fff;display:flex;justify-content:center;align-items:center;min-height:100vh}
.container{width:95%;max-width:700px;background:#121a2b;border-radius:20px;padding:24px;box-shadow:0 10px 30px rgba(0,0,0,.35)}
.header{text-align:center}
.logo{width:90px;height:90px;border-radius:50%;object-fit:cover;border:3px solid #3b82f6}
h1{margin:12px 0 6px;font-size:28px}
p{margin:0;color:#b8c2d9}
.player{margin-top:24px;text-align:center}
button{background:#3b82f6;color:#fff;border:none;padding:14px 28px;border-radius:999px;font-size:18px;cursor:pointer}
button:hover{opacity:.92}
audio{width:100%;margin-top:15px}
.chat{margin-top:28px}
#messages{height:220px;overflow:auto;background:#0b1220;border-radius:14px;padding:12px}
.msg{padding:8px 10px;margin-bottom:8px;background:#1e293b;border-radius:10px}
.row{display:flex;gap:10px;margin-top:12px}
input{flex:1;padding:12px;border-radius:10px;border:none}
.send{padding:12px 18px;border-radius:10px}
.small{font-size:12px;color:#93a0bf;margin-top:10px;text-align:center}
</style>
</head>
<body>
<div class="container">
  <div class="header">
    <img class="logo" src="airport icon.png" alt="Logo">
    <h1>Aeropuerto Silvio Pettirossi SGAS</h1>
    <p>Escucha en vivo frecuencias aeronáuticas</p>
  </div>

  <div class="player">
    <button onclick="playAudio()">▶ Play</button>
    <audio id="radio" controls>
      <source src="https://www.liveatc.net" type="audio/mpeg">
      Tu navegador no soporta audio.
    </audio>
  </div>

  <div class="chat">
    <h2>Chat</h2>
    <div id="messages"></div>
    <div class="row">
      <input id="text" placeholder="Escribe un mensaje...">
      <button class="send" onclick="sendMsg()">Enviar</button>
    </div>
    <div class="small">Chat local demo. Para chat real conecta Firebase o Socket.io</div>
  </div>
</div>

<script>
function playAudio(){document.getElementById('radio').play();}
function sendMsg(){
 const input=document.getElementById('text');
 const val=input.value.trim();
 if(!val)return;
 const div=document.createElement('div');
 div.className='msg';
 div.textContent=val;
 document.getElementById('messages').appendChild(div);
 input.value='';
 document.getElementById('messages').scrollTop=99999;
}
</script>
</body>
</html>
